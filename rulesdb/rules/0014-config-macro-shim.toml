# SPDX-License-Identifier: GPL-2.0-only
id = "config-macro-shim"
version = 1
tier = 1
category = "macro"

[match]
c = "call to a config-dependent function-like macro (cond_resched, might_resched, …) whose expansion varies by Kconfig"

[emit]
kind = "rust-macro"
rust = "add rust_helper_<name>() in rust/helpers/*.c compiling the macro in C; call bindings::<name>() from Rust — config semantics stay compiled in C, one shim per macro"
deviations = ["one extra (inlinable) call level; behaviour is config-correct by construction"]

[provenance]
derivation = "API-inspired"
evidence = ["rust/helpers/task.c precedent (might_resched); our rust_helper_cond_resched follows it"]

[validation]
instances = ["lib/sort.c:__sort_r (cond_resched)", "lib/decompress.c:decompress_method (pr_debug — kernel::print's pr_debug! needs a crate-root __LOG_PREFIX from module!{} that a per-file lib/*_rs.rs translation has no access to; shimmed the exact call site as rust_helper_pr_debug_decompress_magic in rust/helpers/print.c, one shim per distinct format string since C varargs macros can't be wrapped generically across FFI either way)", "lib/hexdump.c:print_hex_dump (printk(fmt,...) is printk_index_wrap(_printk, fmt, ...) — same build-time-indexing-macro story as pr_debug/pr_warn; 3 shims in rust/helpers/print.c, one per DUMP_PREFIX_* switch-branch argument shape: rust_helper_printk_hex_dump_address/_offset/_none)", "lib/strnlen_user.c:do_strnlen_user/strnlen_user (access_ok/untagged_addr/TASK_SIZE_MAX/user_read_access_begin/user_read_access_end/unsafe_get_user shimmed in rust/helpers/uaccess.c as rust_helper_strnlen_user_task_size_max/untagged_addr_ul/access_ok/user_read_access_begin/_end/unsafe_get_user_ul — first uaccess-family instance of this rule)", "lib/strncpy_from_user.c:do_strncpy_from_user/strncpy_from_user (reuses every strnlen_user shim above verbatim, PLUS one new byte-sized sibling rust_helper_unsafe_get_user_u8 for the byte-at-a-time fallback loop — same shim contract, unsigned char instead of unsigned long)", "lib/usercopy.c:check_zeroed_user (reuses rust_helper_user_read_access_begin/_end + rust_helper_unsafe_get_user_ul verbatim from strnlen_user — no new shim needed, it only reads word-sized values, unlike strncpy_from_user's byte-sized addition); lib/usercopy.c:_copy_from_user/_copy_to_user (a DIFFERENT motivation for this same rule: not a config-dependent macro, but a `static inline` header function — _inline_copy_from_user/_inline_copy_to_user in include/linux/uaccess.h — that is not itself a linkable C symbol to bind to; two new shims rust_helper_inline_copy_from_user/_to_user call the real inlines unchanged, kept deliberately separate from the pre-existing rust_helper__copy_from_user/_to_user shims which are `#ifdef INLINE_COPY_USER`-gated to the opposite, unused config arm for this build — same 'leave arch/config-sensitive logic compiled in C' motivation as the macro case, just with a static-inline-function trigger instead of a macro-expansion trigger)"]
oracle = "tier4"
negative = ["macros whose EXPANSION captures caller context (__FILE__/__LINE__, alternatives/asm) — shim loses the call site; needs per-macro thought"]
human_review = false
