# SPDX-License-Identifier: GPL-2.0-only
id = "goto-shared-label-distinct-value"
version = 1
tier = 1
category = "stmt"

[match]
c = "a statement-expression (GNU `({ ... })`) with two `goto`-reachable exit labels where an EARLIER label is reached with the result variable still at its ORIGINAL (pre-loop) value, and a LATER label is reached only after the result variable has been recomputed — e.g. FIND_NTH_BIT in lib/find_bit.c: `goto out` (before the FETCH/tmp update) falls straight through to `out: sz;` returning the untouched size, while `goto found` and the natural fallthrough both hit `found: sz = idx*BITS_PER_LONG + fns(tmp, nr);` first"
family = "MACROSTMT:multi-label-goto-distinct-return-value"
constraints = ["verify the exact statement range between each goto site and its target label — do not assume all exits of a labeled block compute the same value; C fallthrough between adjacent labels (found: falls into out:) is easy to misread as 'both labels return the same expression'"]

[match.variant_early_exit_shared_label]
c = "a loop with a SHARED exit label reached two ways: an in-loop `goto done` guarded by `unlikely(cond)` that fires the instant a value becomes non-default (leaving the result variable exactly as last computed, NOT re-touched), vs the loop's natural exhaustion/fallthrough into the SAME label, which THEN runs one more cleanup/trim statement before the label's shared tail executes — e.g. check_zeroed_user in lib/usercopy.c: `if (unlikely(val)) goto done;` mid-loop jumps straight to `done: user_read_access_end(); return (val == 0);`, skipping the post-loop `if (size < sizeof(unsigned long)) val &= aligned_byte_mask(size);` trim that the natural while-exit path runs immediately before falling into that same `done:` — unlike the base pattern above, the label's own tail expression IS identical on both paths (`val == 0` either way); what differs is whether a statement BEFORE the label executes on the way in"
family = "MACROSTMT:early-exit-skips-post-loop-cleanup"
constraints = ["do not assume a shared exit label means the paths reaching it are equivalent even when the label's own trailing expression is textually identical — check whether the natural-fallthrough path executes any statement between the loop and the label that the early-exit goto jumps over", "translate as a labeled block (Rust `'name: { ... }`) with the early exit as `break 'name` placed BEFORE the cleanup statement, and the cleanup statement placed at the end of the block body so only the natural-fallthrough path reaches it — do not hoist the cleanup above the early-exit check 'for simplicity', that silently applies it to the early-exit path too"]

[emit]
kind = "rewrite"
rust = "one `return <value>` per distinct exit semantics — do NOT collapse multiple goto sites into a single early-return unless every one of them is provably reached with the same live state; when in doubt, trace each goto site back to its label by hand and write down what's live at that point before writing the Rust"
deviations = ["none — this is a translation-process rule (a checklist item), not a semantic transform"]

[provenance]
derivation = "independently derived"
evidence = ["caught during this TU's own translation: `goto out` in FIND_NTH_BIT was first (wrongly) translated as `return idx*BITS_PER_LONG + fns(tmp, nr)`, matching the `found:` exit instead of `out:`'s `return size` — the tier-2.5 diff oracle did not surface it in early ad-hoc runs by chance (the mismatching branch is only hit when idx*BITS_PER_LONG+nr >= size inside the loop, a narrower input class), it was caught by manual re-derivation against the macro source before the oracle run, and confirmed absent afterward across 20000 randomized cases"]

[validation]
instances = ["lib/find_bit.c:__find_nth_bit / __find_nth_and_bit / __find_nth_and_andnot_bit (FIND_NTH_BIT's goto out vs goto found)", "lib/strncpy_from_user.c:do_strncpy_from_user (TWO distinct unsafe_get_user() fault targets, not the usual shared-label case: the word-at-a-time loop's fault goes to `byte_at_a_time` — a fallback into a DIFFERENT loop with `res`/`max` state carried forward, not a return — while the byte-at-a-time loop's own fault goes straight to `efault` -> `return -EFAULT`; translated as a `break` out of the word loop vs a direct `return`, never collapsed into one match arm despite both stemming from the same unsafe_get_user_* helper's None case)", "lib/usercopy.c:check_zeroed_user, match.variant_early_exit_shared_label instance: 'if (unlikely(val)) goto done;' mid-loop vs natural while-exit both reach done:, but only the natural-exit path runs the post-loop 'val &= aligned_byte_mask(size)' trim first; translated as a labeled Rust block ('scan: { while ... { if val != 0 { break 'scan; } ... } if size < sizeof::<usize>() { val &= aligned_byte_mask(size); } }') so the trim only executes on fallthrough, not on the early break 'scan — same discipline as the base pattern (never collapse two goto-reachable paths that differ in what ran before the shared point), extended to a case where the label's own tail expression IS identical, but a statement immediately before it is not"]
oracle = "tier2.5"
negative = ["single-label statement-expressions (FIND_FIRST_BIT has none; FIND_NEXT_BIT's single `out:` is reached before any reassignment on every path — safe to collapse there)", "a shared label where every goto site AND the natural fallthrough execute the exact same statements before it, with nothing skippable in between — safe to collapse (this is the common case; the variant above is specifically for when something IS skipped)"]
human_review = false
