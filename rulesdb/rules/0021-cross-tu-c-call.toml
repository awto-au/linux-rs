# SPDX-License-Identifier: GPL-2.0-only
id = "cross-tu-c-call"
version = 1
tier = 1
category = "api"

[match]
c = "translated TU calls a plain exported/declared C function, OR reads a plain exported/declared C DATA symbol (e.g. lib/ctype.c's `extern const unsigned char _ctype[]`, read through the `isspace()`/`isalpha()`/... macros), that lives in a DIFFERENT, not-yet-translated TU (e.g. lib/find_bit.c's find_random_bit calling __bitmap_weight from lib/bitmap.c, __get_random_u32_below from drivers/char/random.c; lib/cmdline.c's next_arg reading _ctype[] via isspace())"
constraints = ["the callee/symbol must be REAL and linkable (EXPORT_SYMBOL'd, or plain extern-declared with a .o providing it) — NOT a static inline (rule 0016/header-inline-dep) and NOT a config-dependent macro (rule 0014/config-macro-shim)", "callee's header must already be reachable from rust/bindings/bindings_helper.h (directly or transitively) for bindgen to emit the binding", "for data symbols: a wrapper macro like isspace(c) that only does a table lookup + mask is fine to reimplement as a thin Rust fn reading bindings::_ctype directly — do NOT hand-transcribe the table's 256 entries, that's exactly the transcription-risk case rule 0021 exists to avoid"]

[emit]
kind = "function"
rust = "call bindings::<name>(...) / read bindings::<data_symbol> directly inside an unsafe block with a SAFETY comment stating the shared contract; no shim, no reimplementation of the underlying table/logic — this is exactly how Rust-for-Linux driver code calls untranslated kernel C, and it's the whole point of doing this TU-by-TU rather than needing the callee translated first"
deviations = ["none — identical call/read, identical ABI, one extra Rust->C hop that inlines away same as any other FFI access"]

[provenance]
derivation = "independently derived"
evidence = ["lib/llist_rs.rs precedent (bindings::llist_load_acquire_first etc. — though those are within-crate kernel API, not cross-TU-translation specifically); this rule names the cross-TU-translation case explicitly since it will recur on every TU with a neighbor dependency", "confirmed against upstream 2026-07-16 (research pass over rust/kernel/, rust/helpers/, rnull, nova-core, binder): rust/helpers/ctype.c ships a rust_helper_isspace shim that NO upstream code actually calls (grep across the whole tree finds zero callers) — cmdline_rs.rs's data-symbol-read idiom (bindings::_ctype direct) is strictly better for this exact case (no extra call hop, no int/bool or locale mismatch risk) and matches this rule's constraint as written. Independent confirmation the rule is correctly targeted, not a case we missed a better upstream shim for."]

[validation]
instances = ["lib/find_bit.c:find_random_bit (bindings::__bitmap_weight, bindings::__get_random_u32_below — both real EXPORT_SYMBOL'd C functions in still-untranslated TUs)", "lib/cmdline.c:next_arg's is_space() helper (bindings::_ctype — a real exported DATA array in still-untranslated lib/ctype.c, read instead of hand-transcribing the 256-entry table)"]
oracle = "tier1 for find_random_bit (compiles + links; non-deterministic so excluded from the tier-2.5 diff oracle by design, not a gap in coverage); tier2.5 for cmdline's is_space (bench/diff_cmdline.{c,rs}, 15000+50000 randomized cases across two seeds, byte-identical)"
negative = ["static __always_inline header functions with no linkable symbol — rule 0016 instead", "config-dependent function-like macros — rule 0014 instead", "calling a C inline WRAPPER around the real symbol (e.g. find_next_bit() the header fast-path, vs _find_next_bit() the real symbol) — call the underlying real symbol / your own equivalent Rust fn directly, never the wrapper (see lib/find_bit.c:find_next_clump8, find_random_bit in this same TU: C calls the find_next_bit()/find_first_bit()/find_nth_bit() inline wrappers, but since size/n are always runtime values at those call sites the wrapper always takes its slow-path branch anyway — Rust calls its own already-translated slow-path fn directly, same result, no phantom binding to a static inline)"]
human_review = false
