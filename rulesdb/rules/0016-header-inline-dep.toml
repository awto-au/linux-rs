id = "header-inline-dep"
version = 1
tier = 1
category = "api"

[match]
c = "translated TU calls a static inline defined in a header (e.g. minmax_reset in <linux/win_minmax.h>) — invisible to bindgen, no linkable symbol"
constraints = ["the inline must be small and self-contained; reimplementation must be kept verbatim-faithful", "other C callers keep using the header copy — the two copies MUST stay semantically identical (note the header path in the Rust doc comment for future sync)"]

[emit]
kind = "rewrite"
rust = "reimplement the inline as a private fn in the translated TU, doc-commented with its header origin; alternatively (for non-trivial inlines) add a rust/helpers shim per rule 0014"
deviations = ["code duplication across languages until the whole family is translated — tracked by the doc comment"]

[provenance]
derivation = "independently derived"
evidence = []

[validation]
instances = ["lib/win_minmax.c:minmax_reset (callers of the header copy remain in C)", "lib/find_bit.c: fns() from <linux/bitops.h>, bitmap_read()/bitmap_get_value8() from <linux/bitmap.h> (specialised to nbits=8, its only call site)", "lib/iomem_copy.c: __raw_readb/__raw_writeb/__raw_readl/__raw_writel/__raw_readq/__raw_writeq from arch/riscv/include/asm/mmio.h — shim path (rule 0014) chosen over reimplementation since these are volatile MMIO primitives with real hardware ordering semantics, not pure arithmetic"]
oracle = "tier2.5"
negative = ["header inlines with memory-ordering or per-CPU semantics — those are tier 3, use a shim, never reimplement"]
human_review = false
