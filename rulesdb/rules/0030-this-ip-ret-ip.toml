# SPDX-License-Identifier: GPL-2.0-only
id = "this-ip-ret-ip"
version = 2
tier = 2
category = "api"

[match]
c = "_THIS_IP_ ({ __label__ __here; __here: (unsigned long)&&__here; }) and _RET_IP_ ((unsigned long)__builtin_return_address(0)) -- GNU address-of-label / builtin used to get a raw instruction-pointer value for debug/lockdep/tracing bookkeeping"
constraints = [
  "the largest single uncovered c2rust failure-signature pattern in this corpus (47445 of ~47.4k rows, essentially the whole table, all 'Cannot translate GNU address of label expression' — re-verified 2026-07-18, count unchanged by today's FileScopeAsmDecl/asm-goto fixes, this pattern is orthogonal to those)",
  "corpus-wide (linux-riscv/): 589 _RET_IP_ sites, 210 _THIS_IP_ sites, only 4 sites already migrated to the new _CODE_LOCATION_ fallback (grep count, 2026-07-18)",
  "the raw address is genuinely needed downstream, not just a debug label: stored as u64/unsigned long (e.g. closure.h's cl->ip), passed across the C ABI to functions like lockdep_hardirqs_on(unsigned long ip), and fed to kernel symbolization (%pS/sprint_symbol) for /proc and trace output -- core::panic::Location::caller() (this project's existing #[track_caller] convention, see rust/kernel/task.rs's might_sleep(), which uses it purely for debug file/line reporting) is NOT a drop-in replacement: it gives file/line/column, not a raw address comparable/printable through the existing C debug pipeline",
  "call-site audit (~120 sites sampled across kernel/locking, kernel/trace, mm, drivers, RCU, sched, closures): ~35% feed lockdep bookkeeping (hlock->acquire_ip, dep_map acquire/release), ~30% feed tracing/probe records (trace_kmalloc, trace_ipi_send, kcov), ~15% struct-field storage for later use, only ~15% are pure debug/logging with no storage or comparison -- real equality comparisons on stored IP values were found (kernel/locking/lockdep.c's lock_point() contention-point dedup, kernel/trace/trace_recursion_record.c's recursion cache, kernel/trace/ftrace.c and fprobe.c address matching), confirming exact-identity/stable-address semantics are load-bearing for the majority of sites, not just a minority -- approach (c) (Location::caller() for a 'just logging' subset) is viable for at most ~15-20% of sites, not a general substitute",
  "upstream reality check, 2026-07-18: linux/include/linux/instruction_pointer.h (split out of kernel.h May 2026, commit e52340de11d8) itself now documents _THIS_IP_ as broken per GCC bug 120071 and LLVM issue 138272 -- both bugs are specific to the GNU address-of-label (&&label) trick used with no computed-goto, NOT to __builtin_return_address(0)/_RET_IP_, which is unaffected -- upstream's own fix is _CODE_LOCATION_, a `({ static const char __here; (unsigned long)&__here; })` marker, already used at 4 sites in this corpus -- LLVM's proposed real fix is a new __builtin_instruction_pointer(), confirmed NOT YET IMPLEMENTED in clang 22.1.8 (this machine's clang, tested 2026-07-18: 'use of unknown builtin')",
  "riscv64 ABI check, 2026-07-18 (this project's actual toolchain: rustc nightly-x86_64-unknown-linux-gnu, riscv64-linux-gnu-gcc 16.1.1): __builtin_return_address(0) compiles to a single `mv a0,ra`-class instruction on riscv64, both with CONFIG_FRAME_POINTER (this project's .config has CONFIG_FRAME_POINTER=y) and with -fomit-frame-pointer (tested explicitly) -- level-0 return-address reads the `ra`/x1 register directly per the RISC-V calling convention and never needs a frame-pointer walk; arch/riscv/kernel/return_address.c's arch_stack_walk()-based implementation only exists for level>0, which _RET_IP_ never uses -- a frame-pointer walk is NOT needed and would be the wrong (fragile) design; a one-instruction register read is architecturally guaranteed instead",
  "rustc nightly primitive check, 2026-07-18: core::intrinsics::return_address() EXISTS (gated behind #[feature(core_intrinsics)], internal-only/discouraged) and cross-compiles+disassembles on riscv64gc-unknown-none-elf to the identical `mv a0,ra` sequence GCC emits, including when #[inline(always)]-wrapped and the value flows into another call (verified with cargo -Z build-std=core) -- but a hand-written core::arch::asm!(\"mv {}, ra\", out(reg) ip) produces byte-equivalent codegen using only stable Rust, and this project already has a house `$crate::asm!` wrapper macro (rust/kernel/lib.rs:278-302, used in bug.rs and jump_label.rs) for exactly this kind of per-arch inline asm -- prefer the asm! form over core_intrinsics to avoid depending on an internal/discouraged compiler API when a stable equivalent gives the same instructions",
  "no core::intrinsics equivalent exists for _THIS_IP_ (checked instruction_pointer, this_ip, current_address -- all 'cannot find function'); this is consistent with the C side also having no non-UB primitive for 'address of here' outside a computed-goto -- translate against _CODE_LOCATION_'s semantics (a stable per-callsite marker address), not the broken GNU label trick, since that is what upstream itself has already moved to",
]

[emit]
kind = "function"
rust = "_RET_IP_ (589/799 sites, the dominant case): translate to a thin #[inline(always)] wrapper using this project's existing $crate::asm! macro, one line per arch: `let ip: usize; unsafe { $crate::asm!(\"mv {0}, ra\", out(reg) ip; ); } ip` for riscv64 (x1/ra register read, no frame pointer needed, verified byte-identical to GCC's __builtin_return_address(0) codegen at every opt level and frame-pointer config tested). Do NOT use core::intrinsics::return_address() as the primary form despite it producing identical codegen -- it requires #[feature(core_intrinsics)], which rustc itself flags as internal-to-the-compiler/discouraged, and this project does not currently depend on that feature (it uses generic_arg_infer, arbitrary_self_types, derive_coerce_pointee, used_with_arg, compiler_builtins -- none of them core_intrinsics). The asm! form gives the same guarantee via a stable, already-idiomatic-to-this-codebase mechanism. Do NOT implement as a C-ABI extern shim calling back into the C _RET_IP_ macro (approach (b)) -- it adds an FFI hop and a real function-call frame for a value that must be captured at the immediate caller's return address, which a non-inlined shim call would corrupt (the shim's own return address, not the original caller's, would be captured one frame too deep) unless heavily fought with #[inline(always)] + link-time verification that it actually did inline -- the asm! form has no such correctness trap.\n_THIS_IP_ (210/799 sites): do NOT translate against the GNU address-of-label semantics (upstream itself calls this broken/UB, GCC bug 120071, LLVM issue 138272, and no Rust primitive exists for it either). Translate against _CODE_LOCATION_'s semantics instead -- a stable, well-defined, per-callsite marker address: `{ static MARKER: u8 = 0; &MARKER as *const u8 as usize }` (needs a fresh MARKER static generated per call site, not shared) -- this is pure safe stable Rust, verified to compile and produce a PC-relative `auipc`-based address load on riscv64gc-unknown-none-elf, no asm/unstable features required. This matches upstream's own direction (_CODE_LOCATION_ already used at 4/210 sites in this corpus) rather than chasing a broken macro's exact-but-UB semantics."
deviations = [
  "when translating a _THIS_IP_ call site whose C code has NOT yet been migrated to _CODE_LOCATION_ upstream (206/210 of this corpus's sites still use raw _THIS_IP_), the Rust translation still targets _CODE_LOCATION_'s well-defined semantics, not a literal translation of the broken GNU label trick -- this is a deliberate deviation from literal C behavior because the literal behavior is undefined and upstream itself is mid-migration away from it; the replacement is behaviorally compatible for every use found in the corpus audit (stable, unique-per-callsite, comparable address) except it will not bit-for-bit match the C compiler's specific (broken) codegen, which was never a guarantee worth preserving",
  "_RET_IP_ translation requires the wrapper function to actually be inlined (#[inline(always)] is a strong hint, not a hard guarantee in Rust) -- if LTO/codegen settings ever cause it not to inline, the captured address would be the wrapper's own return address (correct, since ra is read before any call in the wrapper) so this is actually safe even without inlining, unlike the rejected extern-C-shim approach (b); noted here so a future reviewer does not need to re-derive why (a) is inlining-safe when (b) was not",
]

[provenance]
derivation = "found via failure-signature frequency analysis of c2rust_failure_signatures, 2026-07-18 -- the single largest uncovered pattern in the corpus by a wide margin; design investigation and riscv64 codegen verification completed 2026-07-18 for awto-au/linux-rs#27"
evidence = [
  "linux/include/linux/instruction_pointer.h (both macro definitions, plus upstream's own HAS_BROKEN_THIS_IP / _CODE_LOCATION_ fallback, commit e52340de11d8, 2026-05-14)",
  "linux/include/linux/closure.h:225,232 (raw address stored in a struct field)",
  "linux/include/linux/cpuidle.h:135,143 (lockdep_hardirqs_on/off(_RET_IP_))",
  "linux/include/linux/bottom_half.h:20,33",
  "linux/include/linux/device.h:1168,1205",
  "kernel/locking/lockdep.c: lock_point() contention-point dedup via IP equality comparison",
  "kernel/trace/trace_recursion_record.c: recursion-detection cache keyed on IP equality",
  "arch/riscv/kernel/return_address.c (this corpus's linux-riscv/): shows arch_stack_walk()-based implementation is only used for level>0, never for level 0 (_RET_IP_'s only use)",
  "riscv64-linux-gnu-gcc 16.1.1 codegen test, 2026-07-18: __builtin_return_address(0) -> `mv a0,ra` at both default (-fno-omit-frame-pointer, CONFIG_FRAME_POINTER=y path) and -O2 -fomit-frame-pointer",
  "rustc nightly-x86_64-unknown-linux-gnu cross-compile to riscv64gc-unknown-none-elf (cargo -Z build-std=core), 2026-07-18: core::intrinsics::return_address() and core::arch::asm!(\"mv {}, ra\") both disassemble to the same instruction GCC emits",
  "clang 22.1.8 (this machine), 2026-07-18: __builtin_instruction_pointer() confirmed not implemented ('use of unknown builtin')",
]

[validation]
instances = []
oracle = "tier1 (riscv64 codegen verified byte-identical to GCC via cross-compilation + objdump disassembly, 2026-07-18); not yet applied to a real corpus translation end-to-end, so not yet tier2.5/tier4"
negative = [
  "checked Rust-for-Linux (rust-for-linux/linux) for prior art via gh search code/prs, 2026-07-18 (re-verified, still zero hits): no hits for _THIS_IP_, _RET_IP_, 'return_address', or 'lockdep' in their Rust code -- genuinely unexplored ground there too, not something to blindly copy from an existing RfL translation",
  "do NOT substitute core::panic::Location::caller() as a quick fix -- it compiles and looks plausible but changes the actual value type and breaks any C-ABI caller expecting a raw address (same failure shape as the fls-family rule's 'compiles, looks plausible, wrong by construction' warning); call-site audit shows only ~15-20% of sites could tolerate this even semantically, and none of them need to since asm!/_CODE_LOCATION_ handle 100% of sites with matching semantics",
  "do NOT use core::intrinsics::return_address() as the primary emit form -- it works and was verified, but depends on #[feature(core_intrinsics)] which rustc marks internal/discouraged, when a stable asm! one-liner gives identical codegen using a pattern this codebase already has (rust/kernel/lib.rs's $crate::asm!)",
  "do NOT implement _RET_IP_ via an extern \"C\" shim into the existing C macro (approach (b), previously listed as a candidate) -- rejected: adds an FFI hop, and unless the shim is verifiably inlined it captures the wrong frame's return address (off-by-one-frame bug that would be silent and hard to detect, since it still compiles and returns a plausible-looking address)",
  "__builtin_instruction_pointer() (LLVM's proposed real fix for the _THIS_IP_ class of problem) does not exist yet in any compiler tested here (clang 22.1.8) -- not usable now, worth re-checking in future toolchain upgrades since it would be a cleaner match than the _CODE_LOCATION_ static-marker translation",
]
human_review = true

[status]
state = "resolved"
note = "Resolved 2026-07-18 for awto-au/linux-rs#27: (a) a small per-arch asm! helper is the recommendation for _RET_IP_ (589/799 sites), verified via real riscv64 cross-compilation to produce codegen identical to GCC's __builtin_return_address(0), reliable regardless of frame-pointer config because RISC-V's calling convention makes level-0 return-address a direct register (ra/x1) read, never a frame-pointer walk. _THIS_IP_ (210/799 sites) has no valid literal translation because the GNU address-of-label trick it uses is itself now documented as broken/UB upstream (GCC 120071, LLVM 138272) -- translate against _CODE_LOCATION_'s well-defined static-marker semantics instead, which upstream itself is migrating to and which needs no asm or unstable features. (b) extern C shim rejected (FFI hop + frame-capture correctness trap under non-inlining). (c) Location::caller() rejected as a general substitute -- call-site audit (~120 sites) found ~80-85% of sites need real address-comparable/stable semantics (lockdep equality checks, trace recursion caches, ftrace address matching), not just human-readable logging."
